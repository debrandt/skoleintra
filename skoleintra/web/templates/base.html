<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Skoleintra{% endblock %}</title>
  <style>
    :root {
      --bg: #f7f4ea;
      --surface: #fffdf6;
      --text: #17202a;
      --muted: #586574;
      --accent: #c85b2f;
      --accent-strong: #9f3e18;
      --line: #e4d7bb;
      --ok: #2f7f4f;
      --warn: #915f1f;
      --shadow: 0 10px 24px rgba(23, 32, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 0%, #fff0cc 0%, transparent 35%),
        radial-gradient(circle at 90% 15%, #f7dbc9 0%, transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      line-height: 1.45;
    }

    a { color: var(--accent-strong); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-right: 14px;
    }

    .pill {
      display: inline-block;
      padding: 6px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fffbf0;
    }

    .metric .label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .metric .value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .muted { color: var(--muted); }
    .small { font-size: 0.92rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f8f0db;
      font-weight: 700;
    }

    tr.unread {
      background: #fff6e2;
    }

    .badge {
      display: inline-block;
      font-size: 0.82rem;
      padding: 2px 7px;
      border-radius: 999px;
      background: #f3e7cc;
      border: 1px solid #e5d3ab;
      color: #6c4b1f;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .toolbar input,
    .toolbar select,
    textarea {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    button,
    .btn {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }

    button.secondary,
    .btn.secondary {
      background: #fff;
      color: var(--accent-strong);
      border-color: var(--line);
    }

    .pagination {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    @media (max-width: 800px) {
      .grid-3 { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="topbar">
      <span class="brand">Skoleintra</span>
      <a class="pill" href="/">Dashboard</a>
      <a class="pill" href="/items">Items</a>
      <a class="pill" href="/settings/notifications">Notifications</a>
      <span class="pill muted small">full-content notifications enabled by design</span>
    </nav>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
